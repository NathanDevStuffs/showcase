
<!DOCTYPE html>
<html>
<head>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=IM+Fell+English&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d0b0f;
    color: #c9b99a;
    font-family: 'IM Fell English', serif;
    min-height: 100vh;
    overflow: hidden;
  }

  #game {
    width: 100%;
    max-width: 680px;
    margin: 0 auto;
    position: relative;
    height: 520px;
    background: #0d0b0f;
    border: 1px solid #2a2230;
    overflow: hidden;
  }

  /* SCENE */
  #scene {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    justify-content: flex-end;
  }

  #scene-bg {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, #050308 0%, #0f0a14 40%, #1a0f22 100%);
  }

  /* Atmosphere layer */
  .atmo {
    position: absolute;
    border-radius: 50%;
    filter: blur(40px);
    pointer-events: none;
  }

  /* HEADER BAR */
  #header {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 16px;
    background: rgba(5,3,8,0.85);
    border-bottom: 1px solid #2a2230;
    z-index: 20;
  }

  .hud-group { display: flex; align-items: center; gap: 12px; }

  .hud-label {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    color: #5a4d6e;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .hud-bar {
    width: 80px; height: 6px;
    background: #1a1220;
    border-radius: 3px;
    overflow: hidden;
  }

  .hud-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  .hp-fill { background: linear-gradient(90deg, #8b2020, #c0392b); }
  .en-fill { background: linear-gradient(90deg, #1a4a7a, #2980b9); }
  .cl-fill { background: linear-gradient(90deg, #5a3a7a, #8e44ad); }

  .hud-val {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    color: #7a6888;
    min-width: 28px;
  }

  #mode-badge {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 2px;
    padding: 3px 10px;
    border-radius: 12px;
    border: 1px solid;
    text-transform: uppercase;
  }

  .badge-investigate { color: #8e44ad; border-color: #5a2d7a; background: rgba(90,45,122,0.15); }
  .badge-combat      { color: #c0392b; border-color: #7a2020; background: rgba(122,32,32,0.15); }

  /* SCENE ART */
  #art-layer {
    position: absolute;
    bottom: 140px; left: 0; right: 0;
    height: 250px;
    pointer-events: none;
  }

  /* CLUE NODES */
  .clue-node {
    position: absolute;
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 1.5px solid #5a2d7a;
    background: rgba(90,45,122,0.2);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    transition: all 0.2s;
    animation: pulse-clue 2s ease-in-out infinite;
  }

  .clue-node:hover {
    border-color: #8e44ad;
    background: rgba(142,68,173,0.35);
    transform: scale(1.15);
  }

  .clue-node.found {
    border-color: #2ecc71;
    background: rgba(46,204,113,0.15);
    animation: none;
  }

  @keyframes pulse-clue {
    0%,100% { box-shadow: 0 0 0 0 rgba(142,68,173,0.4); }
    50%      { box-shadow: 0 0 0 8px rgba(142,68,173,0); }
  }

  /* ENEMY */
  #enemy-container {
    position: absolute;
    top: 60px; right: 80px;
    display: flex; flex-direction: column; align-items: center;
    gap: 6px;
    display: none;
  }

  #enemy-hp-bar {
    width: 100px; height: 5px;
    background: #1a0a0a;
    border-radius: 3px; overflow: hidden;
    border: 1px solid #3a1010;
  }

  #enemy-hp-fill {
    height: 100%; background: linear-gradient(90deg, #7a1010, #c0392b);
    border-radius: 3px; transition: width 0.3s;
  }

  #enemy-name {
    font-family: 'Cinzel', serif;
    font-size: 10px; color: #c0392b;
    letter-spacing: 1px;
  }

  #enemy-sprite {
    font-size: 52px;
    filter: drop-shadow(0 0 12px rgba(192,57,43,0.6));
    animation: enemy-idle 3s ease-in-out infinite;
    cursor: default;
  }

  @keyframes enemy-idle {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-6px); }
  }

  @keyframes enemy-hit {
    0%   { transform: translateX(0) scale(1); filter: drop-shadow(0 0 20px #ff4444); }
    25%  { transform: translateX(12px) scale(1.1); }
    75%  { transform: translateX(-8px) scale(0.95); }
    100% { transform: translateX(0) scale(1); filter: drop-shadow(0 0 12px rgba(192,57,43,0.6)); }
  }

  .enemy-shake { animation: enemy-hit 0.4s ease forwards !important; }

  /* CHARACTER */
  #player-sprite {
    position: absolute;
    bottom: 148px; left: 60px;
    font-size: 48px;
    filter: drop-shadow(0 0 10px rgba(100,60,180,0.5));
    animation: player-idle 4s ease-in-out infinite;
  }

  @keyframes player-idle {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-4px); }
  }

  @keyframes player-attack {
    0%   { transform: translateX(0); }
    40%  { transform: translateX(80px) scaleX(1.1); }
    100% { transform: translateX(0); }
  }

  /* BOTTOM UI */
  #bottom-ui {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: rgba(5,3,8,0.92);
    border-top: 1px solid #2a2230;
    padding: 12px 16px;
    z-index: 20;
  }

  /* DIALOGUE */
  #dialogue-box {
    min-height: 56px;
    margin-bottom: 10px;
    padding: 10px 14px;
    background: rgba(15,10,20,0.8);
    border: 1px solid #2a2230;
    border-radius: 6px;
    position: relative;
  }

  #speaker-tag {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    color: #8e44ad;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  #dialogue-text {
    font-size: 13px;
    color: #c9b99a;
    line-height: 1.5;
    min-height: 18px;
  }

  /* CLUE BOARD */
  #clue-board {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
    flex-wrap: wrap;
    min-height: 28px;
  }

  .clue-tag {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    padding: 3px 8px;
    border-radius: 12px;
    border: 1px solid;
    letter-spacing: 1px;
    animation: clue-appear 0.3s ease;
  }

  @keyframes clue-appear {
    from { transform: scale(0.8); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  .ct-purple { color: #8e44ad; border-color: #5a2d7a; background: rgba(90,45,122,0.2); }
  .ct-gold   { color: #f39c12; border-color: #7a5010; background: rgba(122,80,16,0.2); }
  .ct-red    { color: #c0392b; border-color: #7a2020; background: rgba(122,32,32,0.2); }
  .ct-blue   { color: #2980b9; border-color: #1a4a7a; background: rgba(26,74,122,0.2); }

  /* ACTION BUTTONS */
  #action-bar {
    display: flex; gap: 8px; flex-wrap: wrap;
  }

  .action-btn {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 7px 14px;
    border-radius: 4px;
    cursor: pointer;
    border: 1px solid;
    background: transparent;
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .btn-examine { color: #8e44ad; border-color: #5a2d7a; }
  .btn-examine:hover { background: rgba(90,45,122,0.3); }
  .btn-move    { color: #c9b99a; border-color: #3a2f48; }
  .btn-move:hover { background: rgba(58,47,72,0.4); }
  .btn-attack  { color: #c0392b; border-color: #7a2020; }
  .btn-attack:hover { background: rgba(122,32,32,0.3); }
  .btn-skill   { color: #2980b9; border-color: #1a4a7a; }
  .btn-skill:hover { background: rgba(26,74,122,0.3); }
  .btn-deduce  { color: #f39c12; border-color: #7a5010; }
  .btn-deduce:hover { background: rgba(122,80,16,0.3); }
  .btn-disabled { opacity: 0.35; cursor: not-allowed; }

  /* COMBAT FLASH */
  #combat-flash {
    position: absolute; inset: 0;
    background: rgba(192,57,43,0.15);
    opacity: 0;
    pointer-events: none;
    z-index: 15;
    transition: opacity 0.1s;
  }

  /* NOTIFICATION */
  #notif {
    position: absolute;
    top: 50px; left: 50%; transform: translateX(-50%);
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 2px;
    padding: 8px 20px;
    border-radius: 4px;
    border: 1px solid;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 30;
    white-space: nowrap;
  }

  .notif-clue    { color: #8e44ad; border-color: #5a2d7a; background: rgba(13,11,15,0.95); }
  .notif-combat  { color: #c0392b; border-color: #7a2020; background: rgba(13,11,15,0.95); }
  .notif-success { color: #f39c12; border-color: #7a5010; background: rgba(13,11,15,0.95); }

  /* SCENE CANVAS */
  canvas#scene-canvas {
    position: absolute; inset: 0; width: 100%; height: 100%;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="game">
  <div id="scene-bg"></div>
  <canvas id="scene-canvas" width="680" height="520"></canvas>

  <!-- Atmosphere orbs -->
  <div class="atmo" style="width:200px;height:200px;background:rgba(80,20,120,0.18);top:60px;left:40px;"></div>
  <div class="atmo" style="width:160px;height:160px;background:rgba(180,40,40,0.1);top:80px;right:60px;"></div>

  <!-- Header HUD -->
  <div id="header">
    <div class="hud-group">
      <span class="hud-label">HP</span>
      <div class="hud-bar"><div class="hud-fill hp-fill" id="hp-fill" style="width:75%"></div></div>
      <span class="hud-val" id="hp-val">75</span>
    </div>
    <div class="hud-group">
      <span class="hud-label">EN</span>
      <div class="hud-bar"><div class="hud-fill en-fill" id="en-fill" style="width:60%"></div></div>
      <span class="hud-val" id="en-val">60</span>
    </div>
    <div class="hud-group">
      <span class="hud-label">Clues</span>
      <div class="hud-bar"><div class="hud-fill cl-fill" id="cl-fill" style="width:0%"></div></div>
      <span class="hud-val" id="cl-val">0/4</span>
    </div>
    <div id="mode-badge" class="badge-investigate">Investigate</div>
  </div>

  <!-- Scene Art Layer -->
  <div id="art-layer">
    <!-- Clue nodes (investigate mode) -->
    <div class="clue-node" id="clue-0" style="left:120px;top:80px" onclick="examineClue(0)" title="Examine">🕯</div>
    <div class="clue-node" id="clue-1" style="left:280px;top:40px" onclick="examineClue(1)" title="Examine">📜</div>
    <div class="clue-node" id="clue-2" style="left:430px;top:100px" onclick="examineClue(2)" title="Examine">🗡</div>
    <div class="clue-node" id="clue-3" style="left:560px;top:60px" onclick="examineClue(3)" title="Examine">🩸</div>
  </div>

  <!-- Player sprite -->
  <div id="player-sprite">🧙</div>

  <!-- Enemy -->
  <div id="enemy-container">
    <div id="enemy-name">SHADOW WRAITH</div>
    <div id="enemy-hp-bar"><div id="enemy-hp-fill" style="width:100%"></div></div>
    <div id="enemy-sprite">👁</div>
  </div>

  <!-- Combat flash -->
  <div id="combat-flash"></div>

  <!-- Notification -->
  <div id="notif"></div>

  <!-- Bottom UI -->
  <div id="bottom-ui">
    <div id="clue-board"></div>
    <div id="dialogue-box">
      <div id="speaker-tag">NARRATOR</div>
      <div id="dialogue-text">The Ashen Quarter. Three murders. No witnesses. Your blade is sharp — but tonight, your mind is sharper.</div>
    </div>
    <div id="action-bar">
      <button class="action-btn btn-examine" onclick="doExamine()">🔍 Examine</button>
      <button class="action-btn btn-move" onclick="doMove()">👣 Move</button>
      <button class="action-btn btn-deduce" id="deduce-btn" onclick="doDeduce()">⚗ Deduce</button>
      <button class="action-btn btn-attack" id="attack-btn" onclick="doAttack()">⚔ Strike</button>
      <button class="action-btn btn-skill" id="skill-btn" onclick="doSkill()">✦ Shadow Step</button>
    </div>
  </div>
</div>

<script>
const STATE = {
  mode: 'investigate',
  hp: 75, en: 60,
  cluesFound: 0, totalClues: 4,
  cluesData: [
    { tag: 'MELTED CANDLE', cls: 'ct-purple', desc: 'A candle burned to nothing. The victim was here for hours before the end.' },
    { tag: 'TORN PARCHMENT', cls: 'ct-gold',  desc: 'A partial sigil. House Valdris. Someone wanted this hidden.' },
    { tag: 'RUNE BLADE',    cls: 'ct-red',    desc: 'A blade etched with suppression runes. Not just a weapon — a key.' },
    { tag: 'FRESH BLOOD',   cls: 'ct-blue',   desc: 'Still warm. The fourth victim — it\'s happening again, right now.' }
  ],
  enemyHp: 100,
  combatPhase: false,
  lastAction: 0,
  attackCount: 0
};

const dialogues = {
  examine: [
    "You scan the chamber. The air smells of sulfur and old secrets.",
    "Your detective's eye catches the angles — something doesn't add up.",
    "There's a pattern here. You feel the threads connecting."
  ],
  move: [
    "You slip through the shadows, silent as a rumor.",
    "Your footsteps echo on the ancient stone. You're being watched.",
    "You advance, keeping one hand on your blade."
  ],
  combatStart: "A Shadow Wraith emerges from the darkness — drawn by the rune blade! Steel yourself.",
  attack: [
    "You slash forward! The wraith recoils, its form flickering.",
    "A precise strike finds the weak point in its spectral form!",
    "You drive the rune blade deep — it screams in silence.",
    "A brutal combo: three strikes, each guided by instinct."
  ],
  skill: [
    "You vanish into shadow — reappearing behind the wraith!",
    "Shadow Step! You phase through its grasp and counter-strike!"
  ],
  deduce: [
    "House Valdris... the suppression runes... the timing of the murders.",
    "The killer isn't mortal. The rune blade was meant to trap a spirit.",
    "You have it. The murders were a ritual. Tonight is the final step."
  ]
};

function setDialogue(speaker, text) {
  document.getElementById('speaker-tag').textContent = speaker;
  document.getElementById('dialogue-text').textContent = text;
}

function showNotif(text, cls) {
  const n = document.getElementById('notif');
  n.textContent = text;
  n.className = 'notif ' + cls;
  n.style.opacity = '1';
  setTimeout(() => n.style.opacity = '0', 1800);
}

function updateHUD() {
  document.getElementById('hp-fill').style.width = STATE.hp + '%';
  document.getElementById('hp-val').textContent = STATE.hp;
  document.getElementById('en-fill').style.width = STATE.en + '%';
  document.getElementById('en-val').textContent = STATE.en;
  document.getElementById('cl-fill').style.width = (STATE.cluesFound / STATE.totalClues * 100) + '%';
  document.getElementById('cl-val').textContent = STATE.cluesFound + '/' + STATE.totalClues;
}

function examineClue(i) {
  if (STATE.combatPhase) return;
  const node = document.getElementById('clue-' + i);
  if (node.classList.contains('found')) return;

  node.classList.add('found');
  STATE.cluesFound++;
  updateHUD();

  const clue = STATE.cluesData[i];
  const board = document.getElementById('clue-board');
  const tag = document.createElement('span');
  tag.className = 'clue-tag ' + clue.cls;
  tag.textContent = clue.tag;
  board.appendChild(tag);

  setDialogue('DISCOVERY', clue.desc);
  showNotif('CLUE FOUND: ' + clue.tag, 'notif-clue');

  if (STATE.cluesFound === STATE.totalClues) {
    setTimeout(triggerCombat, 1200);
  }
}

function triggerCombat() {
  STATE.combatPhase = true;
  STATE.mode = 'combat';

  document.getElementById('mode-badge').textContent = 'Combat';
  document.getElementById('mode-badge').className = 'badge-combat';
  document.getElementById('enemy-container').style.display = 'flex';

  // Hide clue nodes
  document.querySelectorAll('.clue-node').forEach(n => n.style.display = 'none');

  setDialogue('SHADOWVEIL', dialogues.combatStart);
  showNotif('COMBAT BEGINS', 'notif-combat');

  flashRed();

  // Enemy attack loop
  setTimeout(enemyAttackLoop, 3000);
}

function flashRed() {
  const f = document.getElementById('combat-flash');
  f.style.opacity = '1';
  setTimeout(() => f.style.opacity = '0', 300);
}

function enemyAttackLoop() {
  if (!STATE.combatPhase || STATE.enemyHp <= 0) return;
  STATE.hp = Math.max(10, STATE.hp - Math.floor(Math.random() * 8 + 5));
  updateHUD();
  setDialogue('SHADOW WRAITH', 'The wraith lashes out! Its claws find their mark.');
  flashRed();
  setTimeout(enemyAttackLoop, 3200);
}

function doExamine() {
  if (STATE.combatPhase) { setDialogue('KAEL', 'No time to investigate — fight!'); return; }
  STATE.en = Math.max(0, STATE.en - 5);
  updateHUD();
  const lines = dialogues.examine;
  setDialogue('KAEL', lines[Math.floor(Math.random() * lines.length)]);
}

function doMove() {
  if (STATE.combatPhase) { setDialogue('KAEL', 'You reposition tactically!'); return; }
  const lines = dialogues.move;
  setDialogue('KAEL', lines[Math.floor(Math.random() * lines.length)]);
}

function doAttack() {
  if (!STATE.combatPhase) {
    setDialogue('KAEL', 'No enemies here... yet. Keep investigating.');
    return;
  }
  STATE.attackCount++;
  const dmg = Math.floor(Math.random() * 18 + 10);
  STATE.enemyHp = Math.max(0, STATE.enemyHp - dmg);
  STATE.en = Math.max(0, STATE.en - 8);

  document.getElementById('enemy-hp-fill').style.width = STATE.enemyHp + '%';
  updateHUD();

  const sprite = document.getElementById('enemy-sprite');
  sprite.classList.remove('enemy-shake');
  void sprite.offsetWidth;
  sprite.classList.add('enemy-shake');

  const playerSprite = document.getElementById('player-sprite');
  playerSprite.style.animation = 'player-attack 0.4s ease forwards';
  setTimeout(() => playerSprite.style.animation = 'player-idle 4s ease-in-out infinite', 450);

  const lines = dialogues.attack;
  setDialogue('KAEL', lines[Math.floor(Math.random() * lines.length)] + ` (${dmg} damage!)`);
  showNotif('-' + dmg + ' DMG', 'notif-combat');

  if (STATE.enemyHp <= 0) {
    setTimeout(combatVictory, 600);
  }
}

function doSkill() {
  if (!STATE.combatPhase) {
    setDialogue('KAEL', 'You practice your shadow step in the darkness. Waiting.');
    return;
  }
  if (STATE.en < 20) {
    setDialogue('KAEL', 'Not enough energy for Shadow Step!');
    return;
  }
  const dmg = Math.floor(Math.random() * 28 + 22);
  STATE.enemyHp = Math.max(0, STATE.enemyHp - dmg);
  STATE.en = Math.max(0, STATE.en - 20);

  document.getElementById('enemy-hp-fill').style.width = STATE.enemyHp + '%';
  updateHUD();

  const sprite = document.getElementById('enemy-sprite');
  sprite.classList.remove('enemy-shake');
  void sprite.offsetWidth;
  sprite.classList.add('enemy-shake');

  setDialogue('KAEL', dialogues.skill[Math.floor(Math.random() * dialogues.skill.length)] + ` (${dmg} damage!)`);
  showNotif('SHADOW STEP! -' + dmg, 'notif-success');

  if (STATE.enemyHp <= 0) {
    setTimeout(combatVictory, 600);
  }
}

function doDeduce() {
  if (STATE.combatPhase) {
    setDialogue('KAEL', 'Focus! Deduce after the fight!');
    return;
  }
  if (STATE.cluesFound < 2) {
    setDialogue('KAEL', 'Not enough clues yet. Keep investigating.');
    return;
  }
  const lines = dialogues.deduce;
  const idx = Math.min(Math.floor(STATE.cluesFound / 1.5) - 1, lines.length - 1);
  setDialogue('KAEL — DEDUCTION', lines[idx]);
  showNotif('DEDUCTION UNLOCKED', 'notif-success');
}

function combatVictory() {
  STATE.combatPhase = false;
  document.getElementById('enemy-container').style.display = 'none';
  document.getElementById('mode-badge').textContent = 'Victory';
  document.getElementById('mode-badge').className = 'badge-investigate';
  setDialogue('NARRATOR', 'The wraith dissolves. The Ashen Quarter is silent. You stand alone with the truth — House Valdris will answer for this.');
  showNotif('VICTORY — CASE ADVANCES', 'notif-success');
}

// Draw scene background art
const canvas = document.getElementById('scene-canvas');
const ctx = canvas.getContext('2d');

function drawScene() {
  ctx.clearRect(0, 0, 680, 520);

  // Moon
  ctx.save();
  ctx.beginPath();
  ctx.arc(340, 85, 38, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(220, 200, 160, 0.12)';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(340, 85, 30, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(220, 200, 160, 0.18)';
  ctx.fill();
  ctx.restore();

  // Distant city silhouette
  ctx.save();
  ctx.fillStyle = 'rgba(20, 10, 30, 0.9)';
  const buildings = [[40,220,60,120],[110,240,45,100],[170,215,55,130],[240,230,50,110],[310,200,70,150],[400,225,55,120],[470,210,60,140],[545,230,50,110],[610,220,55,120]];
  buildings.forEach(([x,y,w,h]) => {
    ctx.fillRect(x, y, w, h);
    // window lights
    for (let wy = y + 12; wy < y + h - 10; wy += 18) {
      for (let wx = x + 8; wx < x + w - 8; wx += 14) {
        if (Math.random() > 0.45) {
          ctx.fillStyle = 'rgba(255, 220, 100, 0.25)';
          ctx.fillRect(wx, wy, 6, 7);
          ctx.fillStyle = 'rgba(20, 10, 30, 0.9)';
        }
      }
    }
    ctx.fillStyle = 'rgba(20, 10, 30, 0.9)';
  });
  ctx.restore();

  // Ground / street
  ctx.save();
  const grd = ctx.createLinearGradient(0, 370, 0, 400);
  grd.addColorStop(0, 'rgba(30,15,45,0.95)');
  grd.addColorStop(1, 'rgba(15,8,22,0.98)');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 370, 680, 130);

  // Cobblestones
  ctx.strokeStyle = 'rgba(50,35,70,0.4)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x < 680; x += 40) {
    for (let y = 372; y < 400; y += 12) {
      ctx.strokeRect(x + (y % 24 === 0 ? 0 : 20), y, 38, 10);
    }
  }
  ctx.restore();

  // Lamppost glow
  [130, 380, 580].forEach(lx => {
    ctx.save();
    const rGlow = ctx.createRadialGradient(lx, 250, 0, lx, 250, 90);
    rGlow.addColorStop(0, 'rgba(255,200,80,0.08)');
    rGlow.addColorStop(1, 'rgba(255,200,80,0)');
    ctx.fillStyle = rGlow;
    ctx.fillRect(lx - 90, 180, 180, 180);
    // Post
    ctx.strokeStyle = 'rgba(120,100,60,0.5)';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(lx, 370); ctx.lineTo(lx, 230); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(lx, 230); ctx.lineTo(lx + 20, 220); ctx.stroke();
    ctx.beginPath();
    ctx.arc(lx + 22, 218, 5, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,200,80,0.7)'; ctx.fill();
    ctx.restore();
  });
}

drawScene();
updateHUD();
</script>
