
<!DOCTYPE html>
<html>
<head>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0a12;color:#c9b99a;font-family:'Cinzel',serif;user-select:none}
#game{width:100%;max-width:680px;margin:0 auto;background:#0d0a12;border:1px solid #2a1f3a}

/* TITLE */
#title-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:520px;background:linear-gradient(180deg,#040208 0%,#0a0615 60%,#14081e 100%);gap:16px}
.t1{font-size:30px;letter-spacing:6px;color:#c9b99a;text-shadow:0 0 30px rgba(140,60,220,.5)}
.t2{font-size:12px;letter-spacing:8px;color:#7030b0;margin-top:4px}
.t3{font-size:8px;letter-spacing:4px;color:#3a2050;margin-top:6px}
.diff-btn{font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;padding:10px 28px;border-radius:4px;cursor:pointer;border:1px solid;background:transparent;transition:all .2s;min-width:200px;text-align:center}
.diff-btn:hover{transform:scale(1.04)}
.d-easy{color:#40c080;border-color:#207040}.d-easy:hover{background:rgba(30,90,50,.3)}
.d-normal{color:#9050d0;border-color:#4a2070}.d-normal:hover{background:rgba(70,20,120,.3)}
.d-hard{color:#d04040;border-color:#702020}.d-hard:hover{background:rgba(100,20,20,.3)}
.diff-sub{font-size:8px;letter-spacing:1px;margin-top:3px;opacity:.6}

/* HUD */
#hud{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:#080610;border-bottom:1px solid #2a1f3a;flex-wrap:wrap;gap:6px}
.hud-item{display:flex;align-items:center;gap:6px}
.hud-label{font-size:9px;color:#5a4070;letter-spacing:2px}
.bar{width:64px;height:5px;background:#1a1028;border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .35s}
.hp-f{background:#b03030}.en-f{background:#2060a0}.cl-f{background:#7030b0}
.hud-num{font-size:10px;color:#7a5a90;min-width:26px}
#mode-tag{font-size:9px;letter-spacing:2px;padding:3px 10px;border-radius:10px;border:1px solid #4a2060;color:#9050d0;background:rgba(80,30,120,.2)}
#mode-tag.combat{border-color:#602020;color:#d03030;background:rgba(100,20,20,.2)}
#mode-tag.victory{border-color:#806010;color:#d0a030;background:rgba(100,70,10,.2)}
#mode-tag.dead{border-color:#404040;color:#606060;background:rgba(30,30,30,.2)}

/* SCENE */
#scene{position:relative;height:210px;overflow:hidden;background:linear-gradient(180deg,#040208 0%,#0a0615 50%,#14081e 100%);transition:background .2s}
#scene.hit{background:rgba(110,18,18,.55)!important}
#scene.player-hit{background:rgba(30,10,60,.7)!important}

.clue-btn{position:absolute;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:6px 10px;border:2px solid #6030a0;border-radius:8px;background:rgba(60,20,100,.35);transition:all .2s;z-index:10}
.clue-btn:hover{border-color:#a060f0;background:rgba(100,40,180,.5);transform:scale(1.08)}
.clue-btn.found{border-color:#40a060;background:rgba(30,80,50,.3);pointer-events:none}
.clue-btn .icon{font-size:20px;line-height:1}
.clue-btn .clue-label{font-size:8px;letter-spacing:1px;color:#a070e0}
.clue-btn.found .clue-label{color:#50c080}

#player{position:absolute;bottom:8px;left:40px;font-size:40px;animation:bob 3s ease-in-out infinite}
#enemy-wrap{position:absolute;top:16px;right:55px;display:none;flex-direction:column;align-items:center;gap:4px}
#ename{font-size:9px;letter-spacing:1px;color:#d04040}
#ebar{width:90px;height:4px;background:#200a0a;border-radius:2px;overflow:hidden;border:1px solid #401010}
#efill{height:100%;background:#b02020;transition:width .3s}
#enemy{font-size:46px;animation:float 2.5s ease-in-out infinite;filter:drop-shadow(0 0 10px rgba(200,50,50,.5))}

@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(10px)}75%{transform:translateX(-8px)}}
@keyframes strike{0%{transform:translateX(0)}40%{transform:translateX(65px)}100%{transform:translateX(0)}}

#toast{position:absolute;top:6px;left:50%;transform:translateX(-50%);font-size:11px;letter-spacing:2px;padding:5px 14px;border-radius:4px;border:1px solid #5a2090;color:#a060e0;background:#080610;opacity:0;transition:opacity .25s;white-space:nowrap;z-index:20;pointer-events:none}
#toast.show{opacity:1}
#toast.ct{border-color:#602020;color:#d06060}
#toast.wt{border-color:#806010;color:#d0a030}
#toast.gt{border-color:#207040;color:#40c080}

#intro-tip{position:absolute;bottom:5px;left:50%;transform:translateX(-50%);font-size:9px;letter-spacing:2px;color:#5a3080;background:#060410;padding:3px 12px;border-radius:10px;border:1px solid #2a1040;white-space:nowrap;z-index:10;animation:tipbob 2s ease-in-out infinite}
@keyframes tipbob{0%,100%{opacity:.6}50%{opacity:1}}

/* COOLDOWN OVERLAY on buttons */
.abtn{position:relative;overflow:hidden;font-family:'Cinzel',serif;font-size:9px;letter-spacing:1px;padding:9px 6px;border-radius:4px;cursor:pointer;border:1px solid;background:transparent;transition:background .15s,opacity .15s;text-align:center}
.abtn:active:not(.dimmed):not(.cooling){transform:scale(.96)}
.abtn .cd-bar{position:absolute;bottom:0;left:0;height:2px;background:rgba(255,255,255,.25);width:0%;transition:none;border-radius:0}

/* CLUE BOARD */
#clue-board{min-height:28px;display:flex;flex-wrap:wrap;gap:5px;padding:7px 14px;border-bottom:1px solid #1a1228;background:#060410;align-items:center}
.ctag{font-size:8px;letter-spacing:1px;padding:3px 8px;border-radius:10px;border:1px solid;animation:pop .25s ease}
@keyframes pop{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.c-purple{color:#9050d0;border-color:#502080;background:rgba(70,20,120,.2)}
.c-gold{color:#d09020;border-color:#806010;background:rgba(100,70,10,.2)}
.c-red{color:#d04040;border-color:#702020;background:rgba(100,20,20,.2)}
.c-blue{color:#3080c0;border-color:#204070;background:rgba(20,50,100,.2)}
#clue-hint{font-size:9px;color:#3a2850;letter-spacing:1px}

/* DIALOGUE */
#dialogue{padding:9px 14px;background:#080610;border-bottom:1px solid #1a1228;min-height:58px}
#who{font-size:9px;color:#7030b0;letter-spacing:2px;margin-bottom:3px}
#dtext{font-size:12px;color:#b09080;line-height:1.55;font-family:Georgia,serif}

/* ACTIONS */
#actions{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:9px 14px;background:#060410}
.a-examine{color:#9050d0;border-color:#4a2070}.a-examine:hover:not(.dimmed):not(.cooling){background:rgba(70,20,120,.3)}
.a-move{color:#c0a080;border-color:#3a2f40}.a-move:hover:not(.dimmed):not(.cooling){background:rgba(50,40,60,.3)}
.a-deduce{color:#d09020;border-color:#706010}.a-deduce:hover:not(.dimmed):not(.cooling){background:rgba(100,70,10,.3)}
.a-attack{color:#d04040;border-color:#702020}.a-attack:hover:not(.dimmed):not(.cooling){background:rgba(100,20,20,.3)}
.a-skill{color:#3080c0;border-color:#204070}.a-skill:hover:not(.dimmed):not(.cooling){background:rgba(20,50,100,.3)}
.a-wait{color:#504060;border-color:#2a1f38}.a-wait:hover:not(.dimmed):not(.cooling){background:rgba(40,30,60,.3)}
.dimmed{opacity:.3;pointer-events:none}
.cooling{opacity:.45;cursor:not-allowed}

/* COMBO */
#combo-meter{display:none;align-items:center;gap:6px;padding:4px 14px;background:#060410;border-bottom:1px solid #1a1228}
#combo-text{font-size:9px;letter-spacing:2px;color:#d0a030}
#combo-bar-wrap{flex:1;height:3px;background:#1a1028;border-radius:2px;overflow:hidden}
#combo-bar{height:100%;background:linear-gradient(90deg,#806010,#d0a030);border-radius:2px;transition:width .2s}

/* END */
#end-screen{display:none;position:absolute;inset:0;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:50;background:rgba(4,2,8,.93)}
#end-title{font-size:22px;letter-spacing:6px}
#end-sub{font-size:10px;letter-spacing:3px;color:#5a4070;text-align:center}
#end-stats{font-size:9px;letter-spacing:2px;color:#4a3860;text-align:center;line-height:2.2}
.end-btn{font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;padding:9px 22px;border-radius:4px;cursor:pointer;border:1px solid;background:transparent;transition:all .2s}
.end-btn:hover{transform:scale(1.04)}
.eb-retry{color:#d0a030;border-color:#806010}.eb-retry:hover{background:rgba(100,70,10,.3)}
.eb-diff{color:#9050d0;border-color:#4a2070}.eb-diff:hover{background:rgba(70,20,120,.3)}

#diff-badge{font-size:8px;letter-spacing:2px;padding:2px 8px;border-radius:8px;border:1px solid}
.db-easy{color:#40c080;border-color:#207040;background:rgba(30,90,50,.2)}
.db-normal{color:#9050d0;border-color:#4a2070;background:rgba(70,20,120,.2)}
.db-hard{color:#d04040;border-color:#702020;background:rgba(100,20,20,.2)}
</style>
</head>
<body>
<div id="game">

<!-- TITLE -->
<div id="title-screen">
  <div style="text-align:center">
    <div class="t1">SHADOWVEIL</div>
    <div class="t2">✦ X3 ✦</div>
    <div class="t3">THE ASHEN QUARTER — REBALANCED</div>
  </div>
  <div style="font-size:9px;letter-spacing:3px;color:#3a2050;margin-top:6px">SELECT DIFFICULTY</div>
  <button class="diff-btn d-easy" onclick="startGame('easy')">☽ WANDERER<div class="diff-sub">Slow enemies · High HP · Long cooldowns hidden</div></button>
  <button class="diff-btn d-normal" onclick="startGame('normal')">⚔ DETECTIVE<div class="diff-sub">Balanced · Attack cooldown · Energy matters</div></button>
  <button class="diff-btn d-hard" onclick="startGame('hard')">💀 WRAITH HUNTER<div class="diff-sub">Fast attacks · Short cooldowns · Punishing</div></button>
</div>

<!-- MAIN GAME -->
<div id="main-game" style="display:none">
  <div id="hud">
    <div class="hud-item">
      <span class="hud-label">HP</span>
      <div class="bar"><div class="bar-fill hp-f" id="hpf"></div></div>
      <span class="hud-num" id="hpn"></span>
    </div>
    <div class="hud-item">
      <span class="hud-label">EN</span>
      <div class="bar"><div class="bar-fill en-f" id="enf"></div></div>
      <span class="hud-num" id="enn"></span>
    </div>
    <div class="hud-item">
      <span class="hud-label">CLUES</span>
      <div class="bar"><div class="bar-fill cl-f" id="clf"></div></div>
      <span class="hud-num" id="cln">0/4</span>
    </div>
    <div id="diff-badge"></div>
    <div id="mode-tag">INVESTIGATE</div>
  </div>

  <div id="scene">
    <div class="clue-btn" id="cb0" style="left:28px;top:95px" onclick="findClue(0)"><span class="icon">🕯️</span><span class="clue-label">EXAMINE</span></div>
    <div class="clue-btn" id="cb1" style="left:172px;top:48px" onclick="findClue(1)"><span class="icon">📜</span><span class="clue-label">EXAMINE</span></div>
    <div class="clue-btn" id="cb2" style="left:338px;top:78px" onclick="findClue(2)"><span class="icon">🗡️</span><span class="clue-label">EXAMINE</span></div>
    <div class="clue-btn" id="cb3" style="left:498px;top:52px" onclick="findClue(3)"><span class="icon">🩸</span><span class="clue-label">EXAMINE</span></div>
    <div id="player">🧙</div>
    <div id="enemy-wrap">
      <span id="ename">SHADOW WRAITH</span>
      <div id="ebar"><div id="efill" style="width:100%"></div></div>
      <div id="enemy">👁️</div>
    </div>
    <div id="toast"></div>
    <div id="intro-tip">▲ CLICK THE GLOWING BOXES TO INVESTIGATE ▲</div>
    <div id="end-screen">
      <div id="end-title"></div>
      <div id="end-sub"></div>
      <div id="end-stats"></div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center">
        <button class="end-btn eb-retry" onclick="retryGame()">↺ RETRY</button>
        <button class="end-btn eb-diff" onclick="changeDiff()">⚙ DIFFICULTY</button>
      </div>
    </div>
  </div>

  <!-- COMBO METER -->
  <div id="combo-meter">
    <span id="combo-text">COMBO x0</span>
    <div id="combo-bar-wrap"><div id="combo-bar" style="width:0%"></div></div>
  </div>

  <div id="clue-board"><span id="clue-hint">— No clues yet — click the glowing boxes above —</span></div>

  <div id="dialogue">
    <div id="who">NARRATOR</div>
    <div id="dtext"></div>
  </div>

  <div id="actions">
    <button class="abtn a-examine" id="btn-examine" onclick="act('examine')">🔍 EXAMINE<div class="cd-bar" id="cd-examine"></div></button>
    <button class="abtn a-move"    id="btn-move"    onclick="act('move')">👣 MOVE<div class="cd-bar" id="cd-move"></div></button>
    <button class="abtn a-deduce"  id="btn-deduce"  onclick="act('deduce')">⚗ DEDUCE<div class="cd-bar" id="cd-deduce"></div></button>
    <button class="abtn a-attack dimmed" id="btn-attack" onclick="act('attack')">⚔ STRIKE<div class="cd-bar" id="cd-attack"></div></button>
    <button class="abtn a-skill dimmed"  id="btn-skill"  onclick="act('skill')">✦ STEP<div class="cd-bar" id="cd-skill"></div></button>
    <button class="abtn a-wait"    id="btn-wait"    onclick="act('wait')">⏳ WAIT<div class="cd-bar" id="cd-wait"></div></button>
  </div>
</div>
</div>

<script>
var G={};
var enemyTimer=null;
var diffKey='normal';
var startTime=0;
var totalHits=0;
var cooldowns={};

var DIFF={
  easy:  {hp:130,en:100,eDmgMin:3, eDmgMax:7, eInterval:4800,eCdReset:true, atkCd:1200,skillCd:2500,label:'WANDERER',   cls:'db-easy'},
  normal:{hp:80, en:80, eDmgMin:6, eDmgMax:14,eInterval:3200,eCdReset:true, atkCd:1800,skillCd:3500,label:'DETECTIVE',  cls:'db-normal'},
  hard:  {hp:55, en:70, eDmgMin:10,eDmgMax:20,eInterval:2100,eCdReset:false,atkCd:1400,skillCd:3000,label:'WRAITH HUNTER',cls:'db-hard'}
};

var clueData=[
  {tag:'MELTED CANDLE', cls:'c-purple',text:'A candle burned to nothing. The victim waited here for hours — for someone they trusted.'},
  {tag:'TORN PARCHMENT',cls:'c-gold',  text:'A partial sigil. House Valdris. Someone tried to destroy this. They failed.'},
  {tag:'RUNE BLADE',    cls:'c-red',   text:'Etched with suppression runes. Forged to trap a spirit — not kill a man.'},
  {tag:'FRESH BLOOD',   cls:'c-blue',  text:'Still warm. The fourth victim — it\'s happening right now. No more time.'}
];

var lines={
  examine:['You scan the chamber. Sulfur and old blood in the air.','Your eye catches the angles — something is deeply wrong here.','There\'s a pattern forming. You feel the threads connecting.'],
  move:['You slip through the shadows, silent as a rumor.','Your footsteps echo on ancient stone. You\'re being watched.','You advance, keeping one hand on your blade.'],
  deduce:['House Valdris... the suppression runes... what connects them?','The murders form a ritual circle — three points down, one to go.','You have it. The rune blade traps a spirit. Tonight is the final binding.'],
  attack:['You slash forward! The wraith recoils.','A precise strike finds the weak point in its spectral form!','You drive the rune blade through its core!'],
  skill:['Shadow Step! You vanish and reappear behind the wraith!','You phase through its grasp and counter-strike from the dark!']
};

function rnd(arr){return arr[Math.floor(Math.random()*arr.length)]}
function randInt(a,b){return Math.floor(Math.random()*(b-a+1))+a}

function startGame(diff){
  diffKey=diff;
  var d=DIFF[diff];
  G={hp:d.hp,maxHp:d.hp,en:d.en,maxEn:d.en,clues:0,found:[false,false,false,false],enemyHp:100,combat:false,victory:false,dead:false,deduceStep:0,combo:0,diff:d};
  totalHits=0; startTime=Date.now(); cooldowns={};

  document.getElementById('title-screen').style.display='none';
  document.getElementById('main-game').style.display='block';

  var db=document.getElementById('diff-badge');
  db.textContent=d.label; db.className='diff-badge '+d.cls;

  for(var i=0;i<4;i++){
    var b=document.getElementById('cb'+i);
    b.classList.remove('found'); b.style.display='flex';
    b.querySelector('.clue-label').textContent='EXAMINE';
  }
  document.getElementById('clue-board').innerHTML='<span id="clue-hint">— No clues yet — click the glowing boxes above —</span>';
  document.getElementById('enemy-wrap').style.display='none';
  document.getElementById('efill').style.width='100%';
  var mt=document.getElementById('mode-tag');
  mt.textContent='INVESTIGATE'; mt.className='';
  document.getElementById('btn-attack').className='abtn a-attack dimmed';
  document.getElementById('btn-skill').className='abtn a-skill dimmed';
  document.getElementById('intro-tip').style.display='block';
  document.getElementById('end-screen').style.display='none';
  document.getElementById('combo-meter').style.display='none';
  document.getElementById('combo-bar').style.width='0%';
  if(enemyTimer)clearTimeout(enemyTimer);
  updateHUD();
  say('NARRATOR','The Ashen Quarter. Three murders. ['+d.label+'] Click the glowing boxes to investigate. In combat: manage energy — you cannot spam attacks.');
}

function retryGame(){startGame(diffKey)}
function changeDiff(){
  if(enemyTimer)clearTimeout(enemyTimer);
  document.getElementById('main-game').style.display='none';
  document.getElementById('title-screen').style.display='flex';
}

function toast(msg,cls){
  var t=document.getElementById('toast');
  t.textContent=msg; t.className='show '+(cls||'');
  clearTimeout(t._tid);
  t._tid=setTimeout(function(){t.className=''},1800);
}
function say(who,text){
  document.getElementById('who').textContent=who;
  document.getElementById('dtext').textContent=text;
}
function updateHUD(){
  var hp=Math.max(0,G.hp),en=Math.max(0,G.en);
  document.getElementById('hpf').style.width=(hp/G.maxHp*100)+'%';
  document.getElementById('hpn').textContent=hp;
  document.getElementById('enf').style.width=(en/G.maxEn*100)+'%';
  document.getElementById('enn').textContent=en;
  document.getElementById('clf').style.width=(G.clues/4*100)+'%';
  document.getElementById('cln').textContent=G.clues+'/4';
}

// COOLDOWN SYSTEM
function startCooldown(id, ms){
  var btn=document.getElementById('btn-'+id);
  var bar=document.getElementById('cd-'+id);
  if(!btn||!bar)return;
  btn.classList.add('cooling');
  cooldowns[id]=true;
  var start=Date.now();
  bar.style.transition='none';
  bar.style.width='100%';
  setTimeout(function(){
    bar.style.transition='width '+ms+'ms linear';
    bar.style.width='0%';
  },30);
  setTimeout(function(){
    btn.classList.remove('cooling');
    cooldowns[id]=false;
    bar.style.width='0%';
  },ms);
}
function isCooling(id){return !!cooldowns[id]}

function findClue(i){
  if(G.combat||G.found[i]||G.dead||G.victory)return;
  G.found[i]=true; G.clues++;
  var b=document.getElementById('cb'+i);
  b.classList.add('found');
  b.querySelector('.clue-label').textContent='FOUND ✓';
  var d=clueData[i];
  var board=document.getElementById('clue-board');
  var hint=document.getElementById('clue-hint');
  if(hint)hint.remove();
  var tag=document.createElement('span');
  tag.className='ctag '+d.cls; tag.textContent=d.tag;
  board.appendChild(tag);
  say('DISCOVERY',d.text);
  toast('CLUE: '+d.tag,'gt');
  updateHUD();
  document.getElementById('intro-tip').style.display='none';
  if(G.clues===4)setTimeout(startCombat,1100);
}

function startCombat(){
  if(G.dead||G.victory)return;
  G.combat=true;
  document.getElementById('mode-tag').textContent='COMBAT';
  document.getElementById('mode-tag').className='combat';
  document.getElementById('enemy-wrap').style.display='flex';
  for(var i=0;i<4;i++)document.getElementById('cb'+i).style.display='none';
  document.getElementById('btn-attack').className='abtn a-attack';
  document.getElementById('btn-skill').className='abtn a-skill';
  document.getElementById('combo-meter').style.display='flex';
  say('SHADOWVEIL','A Shadow Wraith tears from the dark! Manage your energy — spamming attacks drains you fast. Use WAIT to recover. Shadow Step hits hard but costs 20 EN.');
  toast('COMBAT! MANAGE YOUR ENERGY!','ct');
  scheduleEnemy();
}

function scheduleEnemy(){
  if(enemyTimer)clearTimeout(enemyTimer);
  enemyTimer=setTimeout(enemyAttack,G.diff.eInterval);
}

function enemyAttack(){
  if(!G.combat||G.victory||G.dead)return;
  var dmg=randInt(G.diff.eDmgMin,G.diff.eDmgMax);
  G.hp-=dmg; G.combo=0;
  updateHUD(); updateCombo();
  var s=document.getElementById('scene');
  s.classList.add('hit');
  setTimeout(function(){s.classList.remove('hit')},260);
  say('SHADOW WRAITH','The wraith strikes through your guard! (-'+dmg+' HP)');
  toast('-'+dmg+' HP','ct');
  if(G.hp<=0){gameOver();return;}
  scheduleEnemy();
}

function updateCombo(){
  var cm=document.getElementById('combo-meter');
  if(!G.combat){cm.style.display='none';return;}
  cm.style.display='flex';
  document.getElementById('combo-text').textContent='COMBO x'+G.combo;
  var pct=Math.min(G.combo/8*100,100);
  document.getElementById('combo-bar').style.width=pct+'%';
}

function dealDamage(baseDmg){
  // combo bonus: +10% per combo hit, max +60%
  var bonus=Math.min(G.combo*0.1,0.6);
  var dmg=Math.round(baseDmg*(1+bonus));
  G.enemyHp=Math.max(0,G.enemyHp-dmg);
  document.getElementById('efill').style.width=G.enemyHp+'%';
  totalHits++;
  G.combo++;
  updateCombo();
  var e=document.getElementById('enemy');
  e.style.animation='shake .32s ease';
  setTimeout(function(){e.style.animation='float 2.5s ease-in-out infinite'},350);
  var p=document.getElementById('player');
  p.style.animation='strike .32s ease';
  setTimeout(function(){p.style.animation='bob 3s ease-in-out infinite'},350);
  if(G.diff.eCdReset)scheduleEnemy();
  if(G.enemyHp<=0)setTimeout(win,450);
  return dmg;
}

function win(){
  if(enemyTimer)clearTimeout(enemyTimer);
  G.victory=true; G.combat=false;
  document.getElementById('mode-tag').textContent='VICTORY';
  document.getElementById('mode-tag').className='victory';
  document.getElementById('enemy-wrap').style.display='none';
  say('NARRATOR','The wraith dissolves into ash. The Ashen Quarter falls silent. House Valdris will answer for this. Case closed.');
  var secs=Math.floor((Date.now()-startTime)/1000);
  showEnd(true,secs);
}
function gameOver(){
  if(enemyTimer)clearTimeout(enemyTimer);
  G.dead=true; G.combat=false;
  document.getElementById('mode-tag').textContent='FALLEN';
  document.getElementById('mode-tag').className='dead';
  say('NARRATOR','You fall. The darkness swallows you. House Valdris wins... for now.');
  var secs=Math.floor((Date.now()-startTime)/1000);
  showEnd(false,secs);
}
function showEnd(won,secs){
  var es=document.getElementById('end-screen');
  es.style.display='flex';
  document.getElementById('end-title').textContent=won?'✦ VICTORY ✦':'— FALLEN —';
  document.getElementById('end-title').style.color=won?'#d0a030':'#606060';
  document.getElementById('end-sub').textContent=won?'The wraith is vanquished. Justice prevails.':'The darkness claims you. The case remains unsolved.';
  document.getElementById('end-stats').innerHTML=
    'Clues found: '+G.clues+'/4\n'+
    'Strikes landed: '+totalHits+'\n'+
    'Time: '+secs+'s\n'+
    'Difficulty: '+G.diff.label;
}

function act(type){
  if(G.dead||G.victory)return;
  if(isCooling(type)){say('KAEL','Still recovering — wait for the cooldown!');return;}

  if(type==='examine'){
    if(G.combat){say('KAEL','No time to investigate — fight!');return;}
    G.en=Math.max(0,G.en-5); updateHUD();
    say('KAEL',rnd(lines.examine));
    startCooldown('examine',800);
  }
  else if(type==='move'){
    say('KAEL',G.combat?'You reposition tactically!':rnd(lines.move));
    startCooldown('move',600);
  }
  else if(type==='deduce'){
    if(G.combat){say('KAEL','Deduce after the fight!');return;}
    if(G.clues<2){say('KAEL','Not enough clues yet.');return;}
    say('KAEL — DEDUCTION',lines.deduce[Math.min(G.deduceStep,2)]);
    G.deduceStep++;
    toast('DEDUCTION!','gt');
    startCooldown('deduce',1200);
  }
  else if(type==='attack'){
    if(!G.combat){say('KAEL','No enemies yet.');return;}
    if(G.en<10){say('KAEL','Out of energy! Use WAIT to recover.');toast('NO ENERGY!','ct');return;}
    G.en=Math.max(0,G.en-10); updateHUD();
    var dmg=dealDamage(randInt(8,16));
    say('KAEL',rnd(lines.attack)+' (-'+dmg+' to wraith)');
    toast('-'+dmg+' DMG','ct');
    startCooldown('attack',G.diff.atkCd);
  }
  else if(type==='skill'){
    if(!G.combat){say('KAEL','Save your energy.');return;}
    if(G.en<20){say('KAEL','Need 20 EN for Shadow Step. Use WAIT first!');toast('NEED 20 EN','ct');return;}
    G.en=Math.max(0,G.en-20); updateHUD();
    var dmg=dealDamage(randInt(22,30));
    say('KAEL',rnd(lines.skill)+' (-'+dmg+'!)');
    toast('SHADOW STEP! -'+dmg,'wt');
    startCooldown('skill',G.diff.skillCd);
  }
  else if(type==='wait'){
    G.en=Math.min(G.maxEn,G.en+18); updateHUD();
    G.combo=0; updateCombo();
    say('KAEL',G.combat?'You steady yourself, recovering energy. (+18 EN)':'You rest, recovering energy. (+18 EN)');
    toast('+18 ENERGY','gt');
    startCooldown('wait',700);
  }
}
</script>
