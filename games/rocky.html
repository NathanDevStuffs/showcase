<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DINO RUN</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --ground: #1a1a1a;
    --accent: #c8f542;
    --dino: #c8f542;
    --obstacle: #ff4444;
    --text: #ffffff;
    --muted: #555;
    --cloud: #1e1e1e;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(48px, 10vw, 96px);
    letter-spacing: 8px;
    color: var(--accent);
    margin-bottom: 4px;
    line-height: 1;
  }

  .tagline {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 32px;
  }

  #game-wrap {
    position: relative;
    width: min(800px, 96vw);
  }

  #canvas {
    display: block;
    width: 100%;
    border: 1px solid #222;
    border-radius: 4px;
    background: var(--bg);
    cursor: pointer;
  }

  .hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 4px 6px;
  }

  .hud-stat { font-size: 12px; color: var(--muted); }
  .hud-stat span { color: var(--accent); font-weight: 700; }

  #msg {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    gap: 8px;
  }

  .msg-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 4px;
    color: var(--accent);
  }

  .msg-sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 3px;
    animation: blink 1.2s infinite;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  .controls-hint {
    margin-top: 24px;
    font-size: 10px;
    color: #333;
    letter-spacing: 2px;
    text-align: center;
  }

  /* scanlines overlay */
  #game-wrap::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    border-radius: 4px;
  }
</style>
</head>
<body>

<h1>DINO RUN</h1>
<p class="tagline">an endless runner</p>

<div id="game-wrap">
  <canvas id="canvas" width="800" height="220"></canvas>
  <div id="msg">
    <div class="msg-title" id="msg-title">READY</div>
    <div class="msg-sub" id="msg-sub">PRESS SPACE / TAP TO START</div>
  </div>
  <div class="hud">
    <div class="hud-stat">SCORE <span id="score-display">00000</span></div>
    <div class="hud-stat">HI <span id="hi-display">00000</span></div>
    <div class="hud-stat">SPEED <span id="speed-display">1.0x</span></div>
  </div>
</div>

<p class="controls-hint">SPACE / ↑ / CLICK to jump &nbsp;|&nbsp; DOUBLE JUMP allowed</p>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const GROUND = H - 40;
const ACCENT = '#c8f542';
const RED = '#ff4444';
const MUTED = '#2a2a2a';
const CLOUD_COL = '#1c1c1c';

// --- State ---
let state = 'idle'; // idle | running | dead
let score = 0, hi = 0, frame = 0;
let speed = 5, baseSpeed = 5;
let jumpCount = 0;

// --- Dino ---
const dino = {
  x: 80, y: GROUND, w: 30, h: 40,
  vy: 0, onGround: true,
  legFrame: 0, dead: false,
  jump() {
    if (jumpCount < 2) {
      this.vy = -13;
      this.onGround = false;
      jumpCount++;
    }
  }
};

// --- Obstacles ---
let obstacles = [];
let nextObstacle = 80;

// --- Clouds ---
let clouds = [
  { x: 200, y: 30, w: 70 },
  { x: 500, y: 55, w: 50 },
  { x: 700, y: 20, w: 90 },
];

// --- Ground lines ---
let groundLines = Array.from({length: 12}, (_, i) => ({ x: i * 70, y: GROUND + 10 + Math.random()*10, len: 10 + Math.random()*20 }));

// --- Input ---
function handleJump() {
  if (state === 'idle') { startGame(); return; }
  if (state === 'dead') { resetGame(); return; }
  dino.jump();
}
document.addEventListener('keydown', e => { if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); handleJump(); } });
canvas.addEventListener('click', handleJump);
canvas.addEventListener('touchstart', e => { e.preventDefault(); handleJump(); }, { passive: false });

function startGame() {
  state = 'running';
  document.getElementById('msg').style.display = 'none';
}

function resetGame() {
  score = 0; frame = 0; speed = baseSpeed; jumpCount = 0;
  dino.y = GROUND; dino.vy = 0; dino.onGround = true; dino.dead = false;
  obstacles = []; nextObstacle = 100;
  state = 'running';
  document.getElementById('msg').style.display = 'none';
}

function die() {
  state = 'dead';
  dino.dead = true;
  if (score > hi) hi = score;
  document.getElementById('msg').style.display = 'flex';
  document.getElementById('msg-title').textContent = 'GAME OVER';
  document.getElementById('msg-sub').textContent = 'PRESS SPACE / TAP TO RESTART';
}

// --- Spawn obstacles ---
function spawnObstacle() {
  const types = ['cactus-sm', 'cactus-lg', 'cactus-cluster', 'bird'];
  const isBird = speed > 7 && Math.random() < 0.3;
  const type = isBird ? 'bird' : types[Math.floor(Math.random() * 3)];
  if (type === 'bird') {
    const heights = [GROUND - 55, GROUND - 30];
    obstacles.push({ x: W + 20, y: heights[Math.floor(Math.random()*heights.length)], w: 34, h: 22, type: 'bird', wingUp: true, wingTimer: 0 });
  } else if (type === 'cactus-cluster') {
    obstacles.push({ x: W + 20, y: GROUND - 36, w: 50, h: 36, type: 'cactus-cluster' });
  } else if (type === 'cactus-lg') {
    obstacles.push({ x: W + 20, y: GROUND - 48, w: 22, h: 48, type: 'cactus-lg' });
  } else {
    obstacles.push({ x: W + 20, y: GROUND - 30, w: 16, h: 30, type: 'cactus-sm' });
  }
}

// --- Draw helpers ---
function drawDino(d) {
  const x = d.x, y = d.y;
  const col = d.dead ? '#ff4444' : ACCENT;
  ctx.fillStyle = col;

  // body
  ctx.fillRect(x - 15, y - 38, 28, 24);
  // neck + head
  ctx.fillRect(x + 5, y - 48, 14, 16);
  // eye
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(x + 14, y - 46, 4, 4);
  ctx.fillStyle = col;
  // tail
  ctx.fillRect(x - 22, y - 30, 10, 10);
  ctx.fillRect(x - 28, y - 22, 8, 8);

  // legs - animate when running
  if (state === 'running' && d.onGround) {
    d.legFrame += 0.25;
    const lf = Math.sin(d.legFrame);
    ctx.fillRect(x - 8, y - 14, 10, 14 + (lf > 0 ? 0 : -6));
    ctx.fillRect(x + 4, y - 14, 10, 14 + (lf > 0 ? -6 : 0));
  } else {
    ctx.fillRect(x - 8, y - 14, 10, 14);
    ctx.fillRect(x + 4, y - 14, 10, 14);
  }

  // arm
  ctx.fillRect(x - 2, y - 28, 8, 6);
}

function drawCactus(o) {
  ctx.fillStyle = RED;
  if (o.type === 'cactus-sm') {
    ctx.fillRect(o.x, o.y, 10, o.h);
    ctx.fillRect(o.x - 6, o.y + 8, 6, 8);
    ctx.fillRect(o.x + 10, o.y + 14, 6, 6);
  } else if (o.type === 'cactus-lg') {
    ctx.fillRect(o.x + 4, o.y, 14, o.h);
    ctx.fillRect(o.x, o.y + 12, 8, 10);
    ctx.fillRect(o.x - 6, o.y + 8, 6, 4);
    ctx.fillRect(o.x + 18, o.y + 18, 8, 10);
    ctx.fillRect(o.x + 26, o.y + 14, 6, 4);
  } else if (o.type === 'cactus-cluster') {
    // three cacti
    ctx.fillRect(o.x, o.y + 6, 10, o.h - 6);
    ctx.fillRect(o.x + 14, o.y, 10, o.h);
    ctx.fillRect(o.x + 30, o.y + 10, 10, o.h - 10);
    ctx.fillRect(o.x + 6, o.y + 14, 8, 6);
    ctx.fillRect(o.x + 24, o.y + 10, 6, 5);
  }
}

function drawBird(o) {
  ctx.fillStyle = RED;
  o.wingTimer++;
  if (o.wingTimer > 10) { o.wingUp = !o.wingUp; o.wingTimer = 0; }
  const bx = o.x, by = o.y;
  // body
  ctx.fillRect(bx + 4, by + 6, 22, 10);
  // beak
  ctx.fillRect(bx + 26, by + 8, 8, 4);
  // eye
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(bx + 22, by + 7, 3, 3);
  ctx.fillStyle = RED;
  // wings
  if (o.wingUp) {
    ctx.fillRect(bx + 6, by, 16, 6);
    ctx.fillRect(bx + 6, by + 16, 16, 6);
  } else {
    ctx.fillRect(bx + 2, by + 3, 20, 6);
    ctx.fillRect(bx + 2, by + 12, 20, 6);
  }
}

function drawCloud(c) {
  ctx.fillStyle = CLOUD_COL;
  ctx.fillRect(c.x, c.y, c.w, 10);
  ctx.fillRect(c.x + 10, c.y - 8, c.w - 20, 10);
  ctx.fillRect(c.x + 20, c.y - 14, c.w - 40, 8);
}

function drawGround() {
  ctx.fillStyle = '#1d1d1d';
  ctx.fillRect(0, GROUND, W, 2);
  ctx.fillStyle = '#222';
  for (const l of groundLines) {
    ctx.fillRect(l.x, l.y, l.len, 1);
  }
}

// --- Collision (AABB) ---
function collides(a, b) {
  const pad = 4;
  return !(
    a.x + a.w - pad < b.x + pad ||
    a.x + pad > b.x + b.w - pad ||
    a.y + a.h - pad < b.y + pad ||
    a.y + pad > b.y + b.h - pad
  );
}

// --- Update ---
function update() {
  if (state !== 'running') return;

  frame++;
  score += Math.ceil(speed / 5);
  speed = baseSpeed + frame * 0.002;

  // gravity
  dino.vy += 0.7;
  dino.y += dino.vy;
  if (dino.y >= GROUND) {
    dino.y = GROUND;
    dino.vy = 0;
    dino.onGround = true;
    jumpCount = 0;
  } else {
    dino.onGround = false;
  }

  // dino hitbox
  const dinoBox = { x: dino.x - 13, y: dino.y - 38, w: 26, h: 38 };

  // obstacles
  nextObstacle -= speed;
  if (nextObstacle <= 0) {
    spawnObstacle();
    nextObstacle = 180 + Math.random() * 200 - speed * 5;
    nextObstacle = Math.max(nextObstacle, 100);
  }

  for (const o of obstacles) {
    o.x -= speed;
    if (collides(dinoBox, o)) { die(); return; }
  }
  obstacles = obstacles.filter(o => o.x > -60);

  // clouds
  for (const c of clouds) {
    c.x -= speed * 0.3;
    if (c.x < -120) c.x = W + 20;
  }

  // ground lines
  for (const l of groundLines) {
    l.x -= speed;
    if (l.x < -40) { l.x = W + Math.random() * 40; l.len = 10 + Math.random() * 20; }
  }

  // HUD
  document.getElementById('score-display').textContent = String(score).padStart(5, '0');
  document.getElementById('hi-display').textContent = String(hi).padStart(5, '0');
  document.getElementById('speed-display').textContent = (speed / baseSpeed).toFixed(1) + 'x';
}

// --- Draw ---
function draw() {
  ctx.clearRect(0, 0, W, H);

  // bg grid lines subtle
  ctx.strokeStyle = '#111';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 80) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, GROUND); ctx.stroke();
  }

  for (const c of clouds) drawCloud(c);
  drawGround();

  for (const o of obstacles) {
    if (o.type === 'bird') drawBird(o);
    else drawCactus(o);
  }

  drawDino(dino);

  // idle flicker
  if (state === 'idle') {
    ctx.fillStyle = 'rgba(200,245,66,0.04)';
    ctx.fillRect(0, 0, W, H);
  }
}

// --- Loop ---
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
