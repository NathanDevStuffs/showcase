let activeTopic = "general";
const usedIndices = {};

function pickResponse(topic) {
  const pool = responses[topic] || responses.general;
  if (!usedIndices[topic]) usedIndices[topic] = [];
  let available = pool.map((_, i) => i).filter(i => !usedIndices[topic].includes(i));
  if (available.length === 0) { usedIndices[topic] = []; available = pool.map((_, i) => i); }
  const idx = available[Math.floor(Math.random() * available.length)];
  usedIndices[topic].push(idx);
  return pool[idx];
}

function detectTopic(text) {
  const lower = text.toLowerCase();
  for (const [topic, words] of Object.entries(keywords)) {
    if (words.some(w => lower.includes(w))) return topic;
  }
  return activeTopic;
}

    ? `<div class="msg-avatar">🇺🇸</div>`
    : `<div class="msg-avatar user-av">You</div>`;
  div.innerHTML = av + `<div class="bubble">${text}</div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function send() {
  const input = document.getElementById("user-input");
  const text = input.value.trim();
  if (!text) return;
  input.value = "";
  addMsg("user", text);

  const typing = document.createElement("div");
  typing.className = "typing-row";
  typing.id = "typing";
  typing.innerHTML = `Trump is typing <span class="dots"><span>.</span><span>.</span><span>.</span></span>`;
  document.getElementById("chat").appendChild(typing);

  setTimeout(() => {
    const el = document.getElementById("typing");
    if (el) el.remove();
    const topic = detectTopic(text);
    addMsg("trump", pickResponse(topic));
  }, 800 + Math.random() * 800);
}

addMsg("trump", "Nobody builds simulators better than me — believe me! This one is TREMENDOUS. The BEST simulator, possibly ever. Twelve topics to choose from. Twelve! More than any other simulator. Go ahead, ask me anything. I know more about everything than anybody. MORE than anybody!");
</script>
